<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SalesFlow LinkedIn Assistant — Dashboard</title>
  <style>
    :root {
      --navy: #16213e;
      --navy-dark: #0f1730;
      --grad-primary: linear-gradient(135deg, #f97316, #ec4899);
      --success-bg: #f0fdf4;
      --success-text: #166534;
      --warn-bg: #fef3c7;
      --warn-text: #92400e;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --bg-light: #f8faff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-light);
      color: #1d2226;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 28px;
      background: linear-gradient(180deg, var(--navy), var(--navy-dark));
    }
    .logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--grad-primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: white;
      box-shadow: 0 6px 18px rgba(249,115,22,.35);
    }
    .logo-text { font-size: 19px; font-weight: 700; color: white; }
    .logo-text span {
      background: var(--grad-primary); -webkit-background-clip: text;
      background-clip: text; color: transparent;
    }
    .logo-sub { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1.2px; text-transform: uppercase; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px 28px; }
    .stat-cards { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-card {
      background: white; border: 1px solid #e3e8f5; border-radius: 12px;
      padding: 16px 20px; min-width: 140px; flex: 1;
    }
    .stat-card .num { font-size: 26px; font-weight: 800; color: var(--navy); }
    .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #7c8aa5; margin-top: 4px; }
    h2 { font-size: 15px; color: var(--navy); margin: 28px 0 10px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e3e8f5; }
    th, td { text-align: left; padding: 10px 14px; font-size: 12.5px; border-bottom: 1px solid #eef1fa; }
    th { background: #f1f4fc; color: #52607a; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .badge-new { background: var(--success-bg); color: var(--success-text); }
    .badge-warn { background: var(--warn-bg); color: var(--warn-text); }
    .badge-overdue { background: var(--error-bg); color: var(--error-text); }
    .badge-neutral { background: #eef1fa; color: #52607a; }
    a.profile-link { color: #ec4899; text-decoration: none; font-weight: 600; }
    #empty { padding: 30px; text-align: center; color: #94a3b8; }
    #loading { padding: 30px; text-align: center; color: #ec4899; font-weight: 600; }
    button#refresh {
      background: var(--grad-primary); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 12.5px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-icon">S</div>
    <div>
      <div class="logo-text">Sales<span>Flow</span></div>
      <div class="logo-sub">LinkedIn Assistant — Dashboard</div>
    </div>
  </header>
  <main>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div></div>
      <button id="refresh">Refresh</button>
    </div>
    <div id="loading">Loading pipeline…</div>
    <div id="content" style="display:none;">
      <div class="stat-cards" id="stat-cards"></div>

      <h2>Overdue / due follow-ups</h2>
      <table id="overdue-table"><thead><tr><th>Prospect</th><th>Stage</th><th>Follow-ups sent</th><th>Due</th><th>Profile</th></tr></thead><tbody></tbody></table>

      <h2>All prospects</h2>
      <table id="all-table"><thead><tr><th>Prospect</th><th>Stage</th><th>Last sent</th><th>Replied</th><th>Automation</th><th>Profile</th></tr></thead><tbody></tbody></table>
    </div>
  </main>
  <script src="dashboard.js"></script>
</body>
</html>
