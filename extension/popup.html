<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 260px;
      margin: 0;
      background: #f8faff;
      color: #1d2226;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      background: linear-gradient(180deg, #16213e, #0f1730);
    }
    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #f97316, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: white;
    }
    .logo-text span {
      background: linear-gradient(135deg, #f97316, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-sub {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .body {
      padding: 14px;
    }
    #status {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #f97316, #ec4899);
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-icon">S</div>
    <div>
      <div class="logo-text">Sales<span>Flow</span></div>
      <div class="logo-sub">LinkedIn Assistant</div>
    </div>
  </div>
  <div class="body">
    <div id="status">Checking backend…</div>
    <div id="automation-status" style="font-size:12px; margin:8px 0; color:#333;">Automation: checking…</div>
    <button id="toggle-automation" style="background:#166534;">Start automation</button>
    <button id="refresh">Refresh pending count</button>
    <button id="open-dashboard" style="margin-top:8px; background:#16213e;">Open Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
